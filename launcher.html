<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=euc-kr">
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>천일서버 런처</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    font-family: Gulim, Dotum, Arial, sans-serif;
    color: #f2d27a;
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(circle at top, #1a1406 0%, #050505 55%),
      #050505;
  }

  .wrap {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 12px;
  }

  .panel {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    border: 1px solid #6f5420;
    background: #0a0a0a;
  }

  .top {
    padding: 10px 12px 8px 12px;
    border-bottom: 1px solid #4c3913;
    background: #120d04;
  }

  .title {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    color: #ffcf63;
    letter-spacing: 1px;
  }

  .sub {
    margin-top: 4px;
    font-size: 11px;
    color: #bfa36a;
  }

  .status-box {
    margin: 10px 12px 0 12px;
    padding: 8px 10px;
    border: 1px solid #6f5420;
    background: #100c05;
    color: #ffe08b;
    font-size: 14px;
    font-weight: bold;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    background: #2ecc71;
  }

  .banner {
    margin: 8px 12px 0 12px;
    padding: 6px 8px;
    border: 1px solid #6f5420;
    background: #151007;
    color: #ffe08b;
    font-size: 11px;
    line-height: 1.4;
  }

  .notice-title {
    font-weight: bold;
    color: #ffb84d;
    margin-bottom: 4px;
  }

  .notice-list {
    margin: 0;
    padding-left: 16px;
  }

  .notice-list li {
    margin: 1px 0;
  }

  .footer {
    margin: 12px 12px 0 12px;
    padding-top: 10px;
    border-top: 1px solid #6f5420;
    color: #e5c97a;
    font-size: 12px;
    text-align: center;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="top">
        <h1 class="title">천일서버</h1>
        <div class="sub">천년의 감성을 살린 서버 · 안정적인 접속 환경</div>
      </div>

      <div class="status-box">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">서버 가동중</span>
      </div>

      <div class="banner">
        <div class="notice-title">[공지사항]</div>
<ul id="noticeList" class="notice-list"></ul>
      </div>

      <script>
var xhr = new ActiveXObject("Microsoft.XMLHTTP");
xhr.open("GET", "notice.txt", false);
xhr.send();

var lines = xhr.responseText.split("\n");
var html = "";

for (var i = 0; i < lines.length; i++) {
  var line = lines[i].replace(/^\s+|\s+$/g, '');
  if (line !== '') {
    html += "<li>" + line + "</li>";
  }
}

document.getElementById("noticeList").innerHTML = html;
</script>
      
      <div class="footer">Copyright © 천일서버. All Rights Reserved.</div>
    </div>
  </div>
</body>
</html>
