<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=euc-kr">
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<title>천일서버 런처</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #050505;
  font-family: Gulim, Dotum, Arial, sans-serif;
  color: #f2d27a;
  overflow: hidden;
}

.wrap {
  width: 100%;
  height: 100%;
  padding: 10px;
  box-sizing: border-box;
}

.panel {
  width: 100%;
  height: 100%;
  border: 1px solid #6f5420;
  background: #0a0a0a;
}

/* 상단 */
.top {
  padding: 10px;
  border-bottom: 1px solid #4c3913;
  background: #120d04;
}

.title {
  font-size: 18px;
  font-weight: bold;
  color: #ffcf63;
}

.sub {
  font-size: 11px;
  color: #bfa36a;
}

/* 상태 */
.status-box {
  margin: 10px;
  padding: 8px;
  border: 1px solid #6f5420;
  background: #100c05;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}

/* 공지 */
.banner {
  margin: 10px;
  padding: 10px;
  border: 1px solid #6f5420;
  background: #151007;
}

.notice-title {
  font-weight: bold;
  color: #ffb84d;
}

.notice-list {
  padding-left: 16px;
  margin: 0;
}

.notice-list li {
  margin: 2px 0;
}

/* 하단 */
.footer {
  text-align: center;
  font-size: 13px;
  color: #e5c97a;
  margin-top: 6px;
  border-top: 1px solid #6f5420;
  padding-top: 6px;
}

/*  왼쪽 버튼 덮기 */
.left-cover {
  position: absolute;
  left: 6px;
  top: 105px;
  width: 150px;
  z-index: 9999;
}

.left-cover img {
  display: block;
  width: 150px;
  margin-bottom: 9px;
  cursor: pointer;
}
</style>

<script>
function goUrl(url){
  window.location.href = url;
}
</script>

</head>
<body>

<!--  한글 버튼 덮기 -->
<div class="left-cover">
  <img src="btn_home.png" onclick="goUrl('https://1000y1001.com')">
  <img src="btn_board.png" onclick="goUrl('https://1000y1001.com/20')">
  <img src="btn_donate.png" onclick="goUrl('https://1000y1001.com/16')">
  <img src="btn_down.png" onclick="goUrl('https://1000y1001.com/21')">
</div>

<div class="wrap">
<div class="panel">

  <div class="top">
    <div class="title">천일서버</div>
    <div class="sub">천년의 감성을 살린 서버 · 안정적인 접속 환경</div>
  </div>

  <div class="status-box">
    <span id="statusDot" class="status-dot"></span>
    <span id="statusText">서버 상태 확인중</span>
  </div>

  <div class="banner">
    <div class="notice-title">[공지사항]</div>
    <ul id="noticeList" class="notice-list"></ul>
  </div>

  <div class="footer">
    Copyright © 천일서버. All Rights Reserved.
  </div>

</div>
</div>

<!-- 공지 -->
<script>
fetch('notice.txt?' + new Date().getTime())
.then(res => res.text())
.then(data => {
  var lines = data.split('\n');
  var html = '';
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if(line !== ''){
      html += '<li>' + line + '</li>';
    }
  }
  document.getElementById('noticeList').innerHTML = html;
});
</script>

<!-- 상태 -->
<script>
fetch('status.txt?' + new Date().getTime())
.then(res => res.text())
.then(data => {
  var status = data.trim();
  var dot = document.getElementById('statusDot');
  var text = document.getElementById('statusText');

  if(status === 'CHECK'){
    dot.style.background = '#e74c3c';
    text.innerHTML = '서버 점검중';
  } else {
    dot.style.background = '#2ecc71';
    text.innerHTML = '서버 가동중';
  }
});
</script>

</body>
</html>
