<title>천일서버 홍보게시판 안내</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    font-family: Gulim, Dotum, Arial, sans-serif;
    color: #f2d27a;
    overflow: hidden;
  }
  body {
    background: radial-gradient(circle at top, #1a1406 0%, #050505 60%), #050505;
  }
  .wrap {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    padding: 12px;
  }
  .panel {
    width: 100%;
    height: 100%;
    box-sizing: border-box;
    border: 1px solid #6f5420;
    background: #0a0a0a;
  }
  .top {
    padding: 12px;
    border-bottom: 1px solid #4c3913;
    background: #120d04;
  }
  .title {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    color: #ffcf63;
    letter-spacing: 1px;
  }
  .sub {
    margin-top: 4px;
    font-size: 11px;
    color: #bfa36a;
  }
  .box {
    margin: 12px;
    padding: 10px;
    border: 1px solid #6f5420;
    background: #151007;
    color: #ffe08b;
    font-size: 12px;
    line-height: 1.7;
  }
  .box-title {
    margin-bottom: 6px;
    font-weight: bold;
    color: #ffb84d;
</html>
